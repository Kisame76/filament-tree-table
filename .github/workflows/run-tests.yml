name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.3', '8.2']
        filament: ['4', '5']
        exclude:
          # Filament v5 needs livewire ^4.1; the only pest-plugin-livewire
          # release that supports livewire 4 (v4.1.0) requires PHP ^8.3.
          # So PHP 8.2 + Filament 5 has no installable dev/test set.
          - php: '8.2'
            filament: '5'

    name: PHP ${{ matrix.php }} - Filament v${{ matrix.filament }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: |
          # CI only: don't let a transient upstream advisory block dependency resolution.
          composer config policy.advisories.block false
          composer require "filament/filament:^${{ matrix.filament }}.0" --dev --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest
